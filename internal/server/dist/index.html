<!doctype html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- The daemon injects the per-install API token here at serve time (KTD11). -->
    <meta name="sm-token" content="__SM_TOKEN__" />
    <title>SkillManage</title>
    <link rel="stylesheet" href="/app.css" />
  </head>
  <body>
    <header>
      <div class="brand">
        <span class="logo">◆</span> SkillManage
      </div>
      <div class="stats" id="stats"></div>
      <div class="actions">
        <label class="toggle"><input type="checkbox" id="autostart" /> 开机自启</label>
        <button id="update-now">立即更新</button>
        <button id="update-force" class="ghost" title="丢弃本地改动，强制与上游一致">强制更新</button>
      </div>
    </header>

    <div id="banner" class="banner hidden"></div>

    <div class="layout">
      <aside>
        <div class="pane-head">
          <h2>仓库</h2>
          <div class="row">
            <button id="export" class="ghost small">导出</button>
            <button id="import" class="ghost small">导入</button>
          </div>
        </div>
        <form id="add-repo">
          <input id="repo-url" placeholder="git 仓 URL (https / ssh / git@…)" required />
          <input id="repo-branch" placeholder="分支(可选)" class="branch" />
          <button type="submit">添加</button>
        </form>
        <ul id="repo-list"></ul>

        <div class="pane-head">
          <h2>未备份 skill</h2>
          <button id="adopt-all" class="ghost small hidden" title="把列出的真身 skill 全部移入受管存储并原位软链">全选收编</button>
        </div>
        <ul id="adopt-list"></ul>
      </aside>

      <main>
        <div class="targets-bar">
          <div id="target-tabs" class="tabs"></div>
        </div>
        <div class="main-head">
          <input id="search" type="search" placeholder="搜索 skill（名称 / 描述）…" />
        </div>
        <div id="skills"></div>
      </main>
    </div>

    <footer id="summary"></footer>

    <div id="target-modal" class="modal hidden">
      <div class="modal-card" style="width:min(520px,100%)">
        <div class="modal-head">
          <h3>添加同步目录</h3>
          <button id="target-modal-close" class="ghost small">关闭</button>
        </div>
        <form id="add-target" style="display:block;padding:16px 18px">
          <label class="tm-label">目录路径（可手输 / 粘贴，或在下方点选）</label>
          <input id="target-path" placeholder="如 ~/.claude/skills/" required style="width:100%" />
          <div id="target-browser" class="dir-browser"></div>
          <label class="tm-label" style="margin-top:14px">别名（可选）</label>
          <input id="target-alias" placeholder="如 我的CC技能" style="width:100%" />
          <div class="row" style="justify-content:flex-end;gap:8px;margin-top:16px">
            <button type="button" id="target-modal-cancel" class="ghost">取消</button>
            <button type="submit">添加</button>
          </div>
        </form>
      </div>
    </div>

    <div id="modal" class="modal hidden">
      <div class="modal-card">
        <div class="modal-head">
          <h3 id="modal-title"></h3>
          <button id="modal-close" class="ghost small">关闭</button>
        </div>
        <p id="modal-desc" class="muted"></p>
        <pre id="modal-content"></pre>
      </div>
    </div>

    <script src="/app.js"></script>
  </body>
</html>

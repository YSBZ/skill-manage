<!doctype html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- The daemon injects the per-install API token here at serve time (KTD11). -->
    <meta name="sm-token" content="__SM_TOKEN__" />
    <title>SkillManage</title>
    <link rel="stylesheet" href="/app.css" />
  </head>
  <body>
    <header>
      <div class="brand">
        <span class="logo">◆</span> SkillManage
      </div>
      <div class="stats" id="stats"></div>
      <div class="actions">
        <label class="toggle"><input type="checkbox" id="autostart" /> 开机自启</label>
        <button id="update-now">立即更新</button>
        <button id="update-force" class="ghost" title="丢弃本地改动，强制与上游一致">强制更新</button>
      </div>
    </header>

    <div id="banner" class="banner hidden"></div>

    <div class="layout">
      <aside>
        <div class="pane-head">
          <h2>仓库</h2>
          <div class="row">
            <button id="export" class="ghost small">导出</button>
            <button id="import" class="ghost small">导入</button>
          </div>
        </div>
        <form id="add-repo">
          <input id="repo-url" placeholder="git 仓 URL (https / ssh / git@…)" required />
          <input id="repo-branch" placeholder="分支(可选)" class="branch" />
          <button type="submit">添加</button>
        </form>
        <ul id="repo-list"></ul>

        <div class="pane-head"><h2>链接目标</h2></div>
        <select id="target" class="target"></select>

        <div class="pane-head"><h2>项目</h2></div>
        <form id="add-project">
          <input id="project-path" placeholder="项目路径" required />
          <button type="submit">登记</button>
        </form>
        <ul id="project-list"></ul>

        <div class="pane-head">
          <h2>本地收编</h2>
          <span class="muted" style="font-size:11px">移入受管存储 + 原位软链</span>
        </div>
        <ul id="adopt-list"></ul>
      </aside>

      <main>
        <div class="main-head">
          <input id="search" type="search" placeholder="搜索 skill（名称 / 描述）…" />
        </div>
        <div id="skills"></div>
      </main>
    </div>

    <footer id="summary"></footer>

    <div id="modal" class="modal hidden">
      <div class="modal-card">
        <div class="modal-head">
          <h3 id="modal-title"></h3>
          <button id="modal-close" class="ghost small">关闭</button>
        </div>
        <p id="modal-desc" class="muted"></p>
        <pre id="modal-content"></pre>
      </div>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
